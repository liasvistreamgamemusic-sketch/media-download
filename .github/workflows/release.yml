name: Release

# タグ v* を push するとトリガー。各OSランナーがビルドし、成果物を
# GitHub Release（ドラフト）にアップロードする。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows (x64)
            args: --win
            fetch: npm run fetch-binaries
          # Apple Silicon ランナーで Intel+arm64 ユニバーサル app をビルド
          # （Intel 専用 macos-13 ランナーの空き待ちを回避）。
          - os: macos-14
            label: macOS (universal)
            args: --mac --universal
            fetch: npm run fetch-binaries -- --mac-universal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch yt-dlp / ffmpeg / ffprobe (static)
        run: ${{ matrix.fetch }}

      - name: Unit tests
        run: npm test

      - name: Build (electron-vite)
        run: npm run build

      # 発行はせずローカルにパッケージのみ作成（electron-builder の publisher は
      # 大容量アップロードで不安定なため使わない）。
      - name: Package (electron-builder)
        run: npx --no-install electron-builder ${{ matrix.args }} --publish never

      # 堅牢なアップローダで Release（ドラフト）に成果物を追加。
      # 複数ジョブが同じタグの Release を find-or-create して追記する。
      - name: Upload to GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          fail_on_unmatched_files: false
          files: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml
